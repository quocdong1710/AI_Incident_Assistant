services:
  db:
    image: postgres:16
    container_name: aia-postgres
    environment:
      POSTGRES_DB: aia
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./team_members_9_nhan_vien_3_nhom.csv:/docker-entrypoint-initdb.d/team_members.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d aia"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aia-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/aia?options=-c%20TimeZone=Asia/Ho_Chi_Minh
      DB_USERNAME: sa
      DB_PASSWORD: 123456
    ports:
      - "8080:8080"
